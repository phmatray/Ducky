name: CI
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: ./build.cmd UnitTests
        env:
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
